# Local dev database for GoTutors Academy.
# Runs Postgres only — the Next.js app runs on your machine with `npm run dev`.
#
#   docker compose up -d      # start the database (appears in Docker Desktop)
#   docker compose down       # stop it (data is kept in the named volume)
#   docker compose down -v    # stop it AND wipe the data
#
# Matches the DATABASE_URL in your .env:
#   DATABASE_URL="postgresql://postgres:postgres@localhost:5433/gotutors?schema=public"

services:
  db:
    image: postgres:16
    container_name: gotutors-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gotutors
    ports:
      # Host port 5433 (not the default 5432) so this DB never collides with or
      # intercepts anything else on your machine using 5432.
      - "5433:5432"
    volumes:
      - gotutors_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gotutors"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  gotutors_db:
